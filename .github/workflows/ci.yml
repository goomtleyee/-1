name: CI/CD to Docker Hub & Local Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:latest
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    
    steps:
    - name: Set PowerShell Execution Policy (Bypass)
      shell: powershell
      run: |
        Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force

    - name: Login to Docker Hub
      shell: powershell
      run: |
        Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
        $pass = "${{ secrets.DOCKERHUB_PASSWORD }}"
        $user = "${{ secrets.DOCKERHUB_USERNAME }}"
        # 윈도우 PowerShell 파이프라인 최적화 방식으로 로그인 시도
        $pass | docker login -u $user --password-stdin

    - name: Pull latest image and restart container
      shell: powershell
      run: |
        Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
        $user = "${{ secrets.DOCKERHUB_USERNAME }}"
        $img = "$user/flower-classifier:latest"
        $container = "ml_flower_server"

        Write-Host "1. Pulling latest image: $img..."
        docker pull $img
        
        Write-Host "2. Checking for existing container: $container..."
        $existing = docker ps -a -q --filter "name=$container"
        if ($existing) {
            Write-Host "Stopping and Removing existing container..."
            docker stop $container
            docker rm $container
        }
        
        Write-Host "3. Starting new container..."
        docker run -d -p 8000:8000 --name $container $img
        
        Write-Host "✅ Deployment Completed Successfully!"
