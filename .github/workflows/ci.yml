name: CI/CD to Docker Hub & Local Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:latest
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:buildcache,mode=max

  deploy:
    # 빌드 및 푸시가 성공한 후에만 실행됩니다.
    needs: build-and-push
    # 사용자님이 설정하신 'Self-hosted' 로컬 컴퓨터에서 실행됩니다.
    runs-on: self-hosted
    
    steps:
    - name: Login to Docker Hub
      shell: pwsh
      run: |
        docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Pull latest image and restart container
      shell: pwsh
      run: |
        # 1. 최신 이미지 가져오기
        docker pull ${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:latest
        
        # 2. 기존 컨테이너가 있다면 중지 및 삭제 (PowerShell 대응)
        $containerName = "ml_flower_server"
        $exists = docker ps -a -q --filter "name=$containerName"
        if ($exists) {
            echo "Stopping and removing existing container: $containerName"
            docker stop $containerName
            docker rm $containerName
        }
        
        # 3. 새 컨테이너 실행
        docker run -d -p 8000:8000 --name $containerName ${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:latest
        
        # 4. 사용하지 않는 이미지 정리 (선택사항)
        docker image prune -f
