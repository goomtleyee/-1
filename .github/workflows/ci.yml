name: CI/CD to Docker Hub

# main 브랜치에 코드가 push 되거나 PR이 생성되면 작동합니다.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        # 캐시된 레이어를 활용하기 위해 Buildx를 설정합니다. (빌드 속도 최적화)
        buildkitd-flags: --debug

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        # GitHub Secrets에서 Docker Hub 자격 증명을 가져옵니다.
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # 이미지 이름 형식: <DockerHub 유저명>/<이미지명>
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:latest
        # Docker 빌드 레이어 캐싱 적용 (다음 빌드부터 시간을 획기적으로 단축)
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/flower-classifier:buildcache,mode=max
