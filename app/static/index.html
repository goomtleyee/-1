<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Flower Classification</title>
    <!-- 구글 폰트 적용 (모던한 느낌) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.5);
            --bg-start: #0f172a;
            --bg-end: #1e1b4b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 배경 구체 (애니메이션 요소) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(138, 43, 226, 0.4); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(59, 130, 246, 0.4); bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        /* 메인 컨테이너 (유리 질감 효과) */
        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #e879f9, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* 업로드 구역 */
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(138, 43, 226, 0.1);
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.8;
            transition: transform 0.3s ease;
        }

        .upload-area:hover .upload-icon {
            transform: translateY(-5px);
            opacity: 1;
        }

        .file-input { display: none; }

        .btn {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
        }

        /* 결과 화면 및 분석 진행 바 */
        .result-container {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .image-preview-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 1.5rem;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 2px solid var(--glass-border);
        }

        #imagePreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .loader {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .prediction-result {
            background: rgba(138, 43, 226, 0.15);
            border: 1px solid rgba(138, 43, 226, 0.3);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1rem;
        }

        .flower-name {
            font-size: 2rem;
            font-weight: 800;
            color: #e879f9;
            margin: 0;
            text-transform: capitalize;
            letter-spacing: 1px;
        }

        .reset-btn {
            margin-top: 1.5rem;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            box-shadow: none;
        }
        .reset-btn:hover {
            background: rgba(255,255,255,0.05);
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <h1>AI Flower Classifier</h1>
        <p class="subtitle">Drag & Drop an image to let AI determine the flower.</p>

        <!-- 이미지 업로드 섹션 -->
        <div id="uploadSection" class="upload-area">
            <div class="upload-icon">🌸</div>
            <h3 style="margin-bottom: 0.5rem; font-weight: 600;">여기에 사진을 놓아주세요</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">또는 버튼을 눌러 사진을 선택하세요 (JPEG, PNG 등)</p>
            <input type="file" id="fileInput" class="file-input" accept="image/*">
            <button class="btn" onclick="document.getElementById('fileInput').click()">사진 선택하기</button>
        </div>

        <!-- 분석 및 결과 섹션 -->
        <div id="resultSection" class="result-container">
            <div class="image-preview-wrapper">
                <img id="imagePreview" src="" alt="Flower Preview">
                <div id="loader" class="loader">
                    <div class="spinner"></div>
                    <span id="loaderText">AI 분석 중...</span>
                </div>
            </div>
            
            <div id="predictionBox" class="prediction-result" style="display: none;">
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;">분석 결과</p>
                <h2 id="resultName" class="flower-name">결과 대기 중</h2>
            </div>
            
            <button id="resetBtn" class="btn reset-btn" style="display: none;" onclick="resetUI()">다른 꽃 사진 분석하기</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const resultSection = document.getElementById('resultSection');
        const imagePreview = document.getElementById('imagePreview');
        const loader = document.getElementById('loader');
        const predictionBox = document.getElementById('predictionBox');
        const resultName = document.getElementById('resultName');
        const resetBtn = document.getElementById('resetBtn');

        // Drag & Drop 이벤트 막기
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 마우스 호버 효과
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => uploadArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => uploadArea.classList.remove('dragover'), false);
        });

        // 파일 드롭 및 클릭 이벤트
        uploadArea.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) processFile(this.files[0]);
        });

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files && files.length > 0) processFile(files[0]);
        }

        // 파일 읽기 및 서버 전송 전 초기 셋팅
        function processFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('이미지 파일 형식(JPG, PNG 등)만 지원합니다.');
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = function() {
                imagePreview.src = reader.result;
                uploadArea.style.display = 'none';
                resultSection.style.display = 'block';
                loader.style.display = 'flex';
                predictionBox.style.display = 'none';
                resetBtn.style.display = 'none';
                
                uploadToAPI(file);
            }
        }

        // FastAPI 서버와 통신 (Fetch API)
        async function uploadToAPI(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult(data.prediction);
                } else {
                    showResult('오류: ' + (data.detail || '분석 실패'));
                    predictionBox.style.borderColor = '#ef4444';
                    resultName.style.color = '#ef4444';
                }
            } catch (error) {
                showResult('네트워크 오류가 발생했습니다');
                predictionBox.style.borderColor = '#ef4444';
                resultName.style.color = '#ef4444';
            }
        }

        // 결과 화면에 띄우기
        function showResult(predictionText) {
            loader.style.display = 'none';
            predictionBox.style.display = 'block';
            resultName.innerText = predictionText;
            resetBtn.style.display = 'inline-block';
        }

        // 초기 화면으로 초기화
        function resetUI() {
            fileInput.value = '';
            uploadArea.style.display = 'flex';
            resultSection.style.display = 'none';
            predictionBox.style.borderColor = 'rgba(138, 43, 226, 0.3)';
            resultName.style.color = '#e879f9';
        }
    </script>
</body>
</html>
